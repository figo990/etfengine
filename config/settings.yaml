app:
  name: "ETFEngine"
  version: "0.1.0"
  log_level: "INFO"
  log_dir: "data/logs"
  timezone: "Asia/Shanghai"

database:
  engine: "duckdb"  # sqlite | duckdb
  path: "data/db/etfengine.duckdb"
  sqlite_path: "data/db/etfengine.sqlite"
  duckdb_memory_limit: null  # 例如 "1GB"；null 表示使用 DuckDB 默认策略

data_source:
  primary: "akshare"
  fallback: "akshare"  # 当前仅实现 akshare provider
  retry:
    max_attempts: 3
    wait_seconds: 5
  rate_limit:
    requests_per_minute: 30
  cache:
    enabled: true
    ttl_hours: 4

backtest:
  default_start_date: "2018-01-01"
  default_end_date: null  # null = 最新日期
  trading_cost:
    commission_rate: 0.0003  # 万3佣金
    min_commission: 5.0      # 最低5元
    stamp_tax_rate: 0.001    # 千1印花税(卖出)
    slippage_rate: 0.0001    # 万1滑点
  rules:
    t_plus_1: true           # A股 T+1 规则
    price_limit: true        # 涨跌停限制

scheduler:
  daily_update_time: "18:30"  # 每日数据更新时间
  signal_generate_time: "19:00"  # 信号生成时间
  industry_chain_update_time: "20:10"  # 产业链企业行情更新时间
  data_quality_check_time: "20:30"  # 数据健康检查与告警时间
  industry_chain_history_days: 183  # 首次抓取约半年历史数据
  dashboard_task_cleanup_time: "21:10"  # 后台任务成功历史清理时间
  dashboard_task_retention_days: 30  # 成功后台任务保留天数，失败/中断任务保留排查
  weekly_report_enabled: true  # 是否自动生成周报
  weekly_report_time: "21:30"  # 周报自动生成时间
  weekly_report_day: "fri"  # 周报生成日
  monthly_report_enabled: true  # 是否自动生成月报
  monthly_report_time: "21:45"  # 月报自动生成时间，默认每月最后一天

data_health:
  market_data_max_age_days: 3
  news_max_age_days: 2
  company_fundamentals_max_age_days: 150
  company_forecasts_max_age_days: 150
  overseas_earnings_max_age_days: 150
  recent_gap_lookback_days: 45
  recent_gap_tolerance_days: 0
  recent_failure_window_hours: 24

notify:
  enabled: false
  channels:
    email:
      enabled: false
      smtp_host: ""
      smtp_port: 465
      username: ""
      password: ""
      receiver: ""
    wechat:
      enabled: false
      webhook_url: ""
